name: Continuous Integration

on:
  - push
  - pull_request

jobs:
  ci:
    name: Quality, test, build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome
        run: bun run qc

      - name: TypeScript
        run: bun run qts

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Verify react client directive
        run: test "$(head -n 1 dist/react.js | tr -d '\r')" = '"use client";'
